services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tfd
      POSTGRES_USER: tfd
      POSTGRES_PASSWORD: tfd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tfd -d tfd"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://tfd:tfd@postgres:5432/tfd?schema=public
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: change-me-in-production
      PORT: 3333
      UPLOADS_DIR: /uploads
    ports:
      - "3333:3333"
    volumes:
      - uploads_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
